name: CI
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --ignore-scripts
      - name: Validate JSON and required web assets
        shell: bash
        run: |
          node -e "for (const f of ['package.json','vercel.json','manifest.json']) JSON.parse(require('fs').readFileSync(f, 'utf8'))"
          test -s index.html
